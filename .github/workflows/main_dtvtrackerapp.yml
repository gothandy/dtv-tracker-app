# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - DTVTrackerApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install and build
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Prune dev dependencies
        run: npm prune --production

      - name: Create deployment zip
        run: zip -r release.zip app.js package.json dist/ node_modules/ frontend/dist/ templates/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v6
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v6
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BFA8880C27E84E65B0C3011181A0AC76 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_94C7F51E6E60439880C12B615207E225 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_659B92CC0E6B4EC59EC9372AB5981C14 }}

      - name: Get resource group
        id: get-rg
        run: |
          RG=$(az webapp list --query "[?name=='DTVTrackerApp'].resourceGroup" -o tsv)
          echo "resource_group=$RG" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group ${{ steps.get-rg.outputs.resource_group }} \
            --name DTVTrackerApp \
            --src-path release.zip \
            --type zip \
            --clean true \
            --async

      - name: Configure app settings
        run: |
          az webapp config appsettings set \
            --resource-group ${{ steps.get-rg.outputs.resource_group }} \
            --name DTVTrackerApp \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp config appsettings delete \
            --resource-group ${{ steps.get-rg.outputs.resource_group }} \
            --name DTVTrackerApp \
            --setting-names WEBSITE_RUN_FROM_PACKAGE SITE_MODE 2>/dev/null || true

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tracker.dtv.org.uk/api/health) || STATUS="000"
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "App is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "App did not become healthy within 5 minutes."
          exit 1
