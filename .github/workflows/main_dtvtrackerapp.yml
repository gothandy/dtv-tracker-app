# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - DTVTrackerApp

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      site_mode:
        description: 'Site mode: v1 (old frontend at /) or v2 (Vue frontend at /)'
        required: false
        default: 'v1'
        type: choice
        options:
          - v1
          - v2

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    # SITE_MODE resolution:
    #   manual run  → workflow input (inputs.site_mode)
    #   push to main → repository variable SITE_MODE (GitHub Settings > Variables)
    #   fallback     → v1
    outputs:
      site_mode: ${{ steps.mode.outputs.site_mode }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve site mode
        id: mode
        run: |
          MODE="${{ inputs.site_mode }}"
          if [ -z "$MODE" ]; then
            MODE="${{ vars.SITE_MODE }}"
          fi
          if [ -z "$MODE" ]; then
            MODE="v1"
          fi
          echo "site_mode=$MODE" >> $GITHUB_OUTPUT
          echo "Resolved SITE_MODE=$MODE"

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install and build
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Build frontend
        run: |
          cd frontend
          npm install
          if [ "${{ steps.mode.outputs.site_mode }}" = "v2" ]; then
            VITE_BASE_PATH=/ npm run build
          else
            VITE_BASE_PATH=/v2/ npm run build
          fi

      - name: Prune dev dependencies
        run: npm prune --production

      - name: Create deployment zip
        run: zip -r release.zip app.js package.json dist/ node_modules/ public/ frontend/dist/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BFA8880C27E84E65B0C3011181A0AC76 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_94C7F51E6E60439880C12B615207E225 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_659B92CC0E6B4EC59EC9372AB5981C14 }}

      - name: Get resource group
        id: get-rg
        run: |
          RG=$(az webapp list --query "[?name=='DTVTrackerApp'].resourceGroup" -o tsv)
          echo "resource_group=$RG" >> $GITHUB_OUTPUT

      - name: Configure app settings
        run: |
          az webapp config appsettings set \
            --resource-group ${{ steps.get-rg.outputs.resource_group }} \
            --name DTVTrackerApp \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false NODE_ENV=production SITE_MODE=${{ needs.build.outputs.site_mode }}
          az webapp config appsettings delete \
            --resource-group ${{ steps.get-rg.outputs.resource_group }} \
            --name DTVTrackerApp \
            --setting-names WEBSITE_RUN_FROM_PACKAGE 2>/dev/null || true

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group ${{ steps.get-rg.outputs.resource_group }} \
            --name DTVTrackerApp \
            --src-path release.zip \
            --type zip \
            --clean true
