<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Details - DTV Tracker</title>
    <meta name="description" content="">
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <meta property="og:image" content="">
    <meta property="og:site_name" content="DTV Tracker">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/media/embla/gallery.css">
    <script src="/js/common.js"></script>
    <script src="/js/session-cards.js"></script>
    <script src="/js/lightbox.js"></script>
    <script src="/js/tag-icons.js"></script>
    <script src="/js/session-tags.js"></script>
    <script src="https://unpkg.com/embla-carousel/embla-carousel.umd.js"></script>
    <script src="/media/embla/gallery.js"></script>
</head>
<body class="detail-page">
    <script>createHeader('Session Details', true);</script>

    <div class="container">
        <div id="content">
            <div class="loading">Loading session details</div>
        </div>
        <div class="info-card unauth-only" style="margin-top: 1rem;">
            <div class="info-card-title">Privacy Protection</div>
            <div class="info-card-body">Users are required to <a id="loginLink" href="/login.html">log in</a> to access volunteer registrations.</div>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal modal-wide">
            <h3>Edit Session</h3>
            <div class="modal-field admin-only">
                <label for="editGroup">Group</label>
                <select id="editGroup" style="width:100%; padding:0.5rem; font-size:0.95rem; border:2px solid var(--border-mid); border-radius:var(--radius); font-family:var(--font);"></select>
            </div>
            <div class="modal-field admin-only">
                <label for="editDate">Date</label>
                <input type="date" id="editDate">
            </div>
            <div class="modal-field">
                <label for="editName">Display Name</label>
                <input type="text" id="editName">
            </div>
            <div class="modal-field">
                <label for="editDescription">Description</label>
                <textarea id="editDescription"></textarea>
            </div>
            <div class="modal-field admin-only">
                <label for="editLimits">Limits JSON</label>
                <input type="text" id="editLimits" placeholder='{"new":4,"total":20}'>
            </div>
            <div class="modal-field admin-only">
                <label for="editEventbriteId">Eventbrite Event ID</label>
                <input type="text" id="editEventbriteId">
            </div>
            <div class="modal-buttons" style="justify-content: space-between;">
                <button class="modal-btn modal-btn-delete admin-only" onclick="deleteSession()" title="Delete session"><img src="/icons/trash.svg" style="width:1.4em;height:1.4em;filter:brightness(0) invert(1);vertical-align:middle;" alt="Delete session"></button>
                <div style="display:flex; gap:0.5rem;">
                    <button class="modal-btn modal-btn-cancel" onclick="closeEditModal()">Cancel</button>
                    <button class="modal-btn modal-btn-confirm" id="confirmEditBtn" onclick="saveSessionEdit()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="hoursModal">
        <div class="modal">
            <h3>Set Default Hours</h3>
            <p>Applies to checked-in entries where hours are currently 0.</p>
            <input type="number" id="defaultHoursInput" min="0" step="0.5" value="3">
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeHoursModal()">Cancel</button>
                <button class="modal-btn modal-btn-confirm" id="confirmHoursBtn" onclick="applyDefaultHours()">Apply</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="photoEditModal">
        <div class="modal">
            <h3>Edit Photo</h3>
            <div class="modal-field">
                <label><input type="checkbox" id="photoPublic"> Public gallery</label>
            </div>
            <div class="modal-field">
                <label><input type="checkbox" id="photoCover"> Cover photo</label>
            </div>
            <div class="modal-field">
                <label for="photoTitle">Description</label>
                <textarea id="photoTitle" rows="3" maxlength="255" placeholder="Alt text / title"></textarea>
            </div>
            <div class="modal-buttons" style="justify-content:space-between;">
                <button class="modal-btn modal-btn-delete" onclick="deletePhoto()" title="Delete photo">
                    <img src="/icons/trash.svg" style="width:1.4em;height:1.4em;filter:brightness(0) invert(1);vertical-align:middle;" alt="Delete">
                </button>
                <div style="display:flex;gap:0.5rem;">
                    <button class="modal-btn modal-btn-cancel" onclick="closePhotoEditModal()">Cancel</button>
                    <button class="modal-btn modal-btn-confirm" onclick="savePhotoEdit()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/session-detail.js"></script>
    <script>
        const loginLink = document.getElementById('loginLink');
        if (loginLink) loginLink.href = '/login.html?returnTo=' + encodeURIComponent(window.location.pathname + window.location.search);
    </script>
</body>
</html>
