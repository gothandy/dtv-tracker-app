<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - DTV Tracker</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/common.js"></script>
    <style>
        .login-btn { display: none !important; }

        .login-container {
            max-width: 480px; margin: 3rem auto; padding: 0 1.25rem; width: 100%;
        }

        .login-option {
            background: var(--surface); border-radius: 12px;
            padding: 1.5rem; box-shadow: var(--shadow);
            margin-bottom: 1rem;
        }

        .login-option h3 { font-size: 1.2rem; color: var(--dark); margin: 0 0 0.3rem; }
        .login-option p { color: var(--text-light); font-size: 0.875rem; margin: 0 0 1.25rem; line-height: 1.4; }

        .magic-email-input {
            display: block; width: 100%; box-sizing: border-box;
            padding: 0.75rem 0.875rem; margin-bottom: 0.625rem;
            border: 1.5px solid var(--border-mid); border-radius: var(--radius);
            font-size: 0.95rem; min-height: 44px;
            color: var(--dark); background: white;
        }
        .magic-email-input:focus { outline: none; border-color: var(--green); }

        .btn-magic-send {
            display: block; width: 100%; box-sizing: border-box;
            padding: 0.8rem 1rem; min-height: 44px;
            background: var(--green); color: white;
            border: none; border-radius: var(--radius);
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
        }
        .btn-magic-send:hover { background: var(--green-dark); }
        .btn-magic-send:disabled { opacity: 0.6; cursor: default; }

        .magic-status {
            font-size: 0.875rem; margin-top: 0.75rem; color: var(--text-light); display: none; line-height: 1.5;
        }
        .magic-status.success { color: #166534; }
        .magic-status.error   { color: #991b1b; }

        .btn-signin {
            display: flex; align-items: center; justify-content: center; gap: 0.6rem;
            width: 100%; box-sizing: border-box;
            padding: 0.8rem 1rem; min-height: 44px;
            border: 1.5px solid var(--border-mid); border-radius: var(--radius);
            font-size: 0.9rem; font-weight: 600; color: var(--dark);
            cursor: pointer; text-decoration: none;
            transition: box-shadow 0.15s, border-color 0.15s;
            background: white;
        }
        .btn-signin:hover { box-shadow: var(--shadow); border-color: var(--border-strong, #aaa); }

        .reason-message {
            background: #fff8e1; border: 2px solid #f59e0b; border-radius: 8px;
            padding: 1rem 1.1rem 1rem 3rem; margin-bottom: 1rem;
            color: #78350f; font-size: 0.9rem; font-weight: 500; line-height: 1.5;
            position: relative;
        }
        .reason-message::before {
            content: "⚠";
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <script>createHeader('Log in', true);</script>

    <div class="login-container">

        <div id="reasonMessage" class="reason-message" style="display:none"></div>

        <!-- Personal account — magic link -->
        <div class="login-option" id="personalCard" style="display:none">
            <h3>Volunteer Sign In</h3>
            <p>View your volunteer profile, register for sessions, and upload photos.</p>
            <input type="email" id="magicEmail" class="magic-email-input"
                   placeholder="your@email.com" autocomplete="email">
            <button id="magicSendBtn" class="btn-magic-send" onclick="sendMagicLink()">Send sign-in link</button>
            <div id="magicStatus" class="magic-status"></div>
        </div>

        <!-- Trusted Account (Microsoft dtv.org.uk) -->
        <div class="login-option">
            <h3>DTV Teams Account</h3>
            <p>For dig leads, coordinators and admins — use your <strong>@dtv.org.uk</strong> Microsoft account.</p>
            <a id="trustedBtn" href="/auth/login" class="btn-signin">
                <img src="/svg/microsoft.svg" width="18" height="18" alt="">
                Continue with Microsoft
            </a>
        </div>

    </div>

    <script>
        const reasons = {
            'not-approved':  (email) => `We don't have an account for ${email ? email : 'that email address'}. Contact your group organiser to get set up.`,
            'not-found':     (email) => `We don't have an account for ${email ? email : 'that email address'}. Contact your group organiser to get set up.`,
            'invalid-state': () => 'That sign-in link has expired or is invalid — enter your email below to get a new one.',
        };

        async function sendMagicLink() {
            const emailEl = document.getElementById('magicEmail');
            const email = emailEl.value.trim();
            if (!email) { emailEl.focus(); return; }

            const btn = document.getElementById('magicSendBtn');
            const status = document.getElementById('magicStatus');
            btn.disabled = true;
            emailEl.disabled = true;
            status.className = 'magic-status';
            status.textContent = 'Sending…';
            status.style.display = 'block';

            const returnTo = new URLSearchParams(window.location.search).get('returnTo');

            try {
                const res = await fetch('/auth/magic/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ destination: email, returnTo: returnTo || undefined }),
                });
                if (res.ok) {
                    status.className = 'magic-status success';
                    status.innerHTML = 'A sign-in link is on its way — check your email and click it to continue.<br><br>Already clicked the link? If you\'re signed in, you can close this tab.';
                } else if (res.status === 429) {
                    status.className = 'magic-status error';
                    status.textContent = 'Too many attempts — please try again later.';
                    btn.disabled = false;
                    emailEl.disabled = false;
                } else {
                    status.className = 'magic-status error';
                    status.textContent = 'Something went wrong. Please try again.';
                    btn.disabled = false;
                    emailEl.disabled = false;
                }
            } catch {
                status.className = 'magic-status error';
                status.textContent = 'Could not send email. Please check your connection and try again.';
                btn.disabled = false;
                emailEl.disabled = false;
            }
        }

        document.getElementById('magicEmail').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMagicLink();
        });

        function init() {
            const params = new URLSearchParams(window.location.search);
            const returnTo = params.get('returnTo');

            if (returnTo && returnTo.startsWith('/')) {
                document.getElementById('trustedBtn').href = `/auth/login?returnTo=${encodeURIComponent(returnTo)}`;
            }

            const reason = params.get('reason');
            if (reason && reasons[reason]) {
                const email = params.get('email');
                fetch('/auth/me').then(r => r.json()).then(data => {
                    if (data.authenticated) {
                        window.location.replace(returnTo && returnTo.startsWith('/') ? returnTo : '/');
                        return;
                    }
                    const el = document.getElementById('reasonMessage');
                    el.textContent = reasons[reason](email);
                    el.style.display = 'block';
                    // Pre-fill email if provided and it's the expiry case
                    if (email && reason === 'invalid-state') {
                        document.getElementById('magicEmail').value = email;
                    }
                }).catch(() => {
                    const el = document.getElementById('reasonMessage');
                    el.textContent = reasons[reason](email);
                    el.style.display = 'block';
                });
            }
        }

        fetch('/auth/providers')
            .then(r => r.json())
            .then(p => {
                if (p.magic) document.getElementById('personalCard').style.display = 'block';
            });

        init();
    </script>
    <script>createFooter();</script>
</body>
</html>
