<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - DTV Tracker</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/common.js"></script>
    <style>
        .login-btn { display: none !important; }

        .login-container {
            max-width: 480px; margin: 3rem auto; padding: 0 1.25rem; width: 100%;
        }

        .login-option {
            background: var(--surface); border-radius: 12px;
            padding: 1.5rem; box-shadow: var(--shadow);
            margin-bottom: 1rem;
        }

        .login-option h3 { font-size: 1.2rem; color: var(--dark); margin: 0 0 0.3rem; }
        .login-option p { color: var(--text-light); font-size: 0.875rem; margin: 0 0 1.25rem; line-height: 1.4; }

        /* Magic link — full-width stacked layout */
        .magic-email-input {
            display: block; width: 100%; box-sizing: border-box;
            padding: 0.75rem 0.875rem; margin-bottom: 0.625rem;
            border: 1.5px solid var(--border-mid); border-radius: var(--radius);
            font-size: 0.95rem; min-height: 44px;
            color: var(--dark); background: white;
        }
        .magic-email-input:focus { outline: none; border-color: var(--green); }

        .btn-magic-send {
            display: block; width: 100%; box-sizing: border-box;
            padding: 0.8rem 1rem; min-height: 44px;
            background: var(--green); color: white;
            border: none; border-radius: var(--radius);
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
        }
        .btn-magic-send:hover { background: var(--green-dark); }
        .btn-magic-send:disabled { opacity: 0.6; cursor: default; }

        .magic-status {
            font-size: 0.875rem; margin-top: 0.5rem; color: var(--text-light); display: none;
        }
        .magic-status.success { color: #166534; }
        .magic-status.error   { color: #991b1b; }

        /* "Or continue with" divider */
        .divider-or {
            display: flex; align-items: center; gap: 0.75rem;
            color: var(--text-light); font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 0.05em; margin: 1.25rem 0;
        }
        .divider-or::before, .divider-or::after {
            content: ''; flex: 1; border-top: 1px solid var(--border);
        }

        /* Google + Facebook side by side */
        .social-btns {
            display: flex; gap: 0.75rem;
        }
        .btn-signin {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.6rem;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border-mid); border-radius: var(--radius);
            font-size: 0.9rem; font-weight: 600; color: var(--dark);
            cursor: pointer; text-decoration: none; min-height: 44px;
            transition: box-shadow 0.15s, border-color 0.15s;
            background: white; box-sizing: border-box;
        }
        .btn-signin:hover { box-shadow: var(--shadow); border-color: var(--border-strong, #aaa); }
        .btn-signin svg, .btn-signin img { flex-shrink: 0; }

        /* Stack on very small screens */
        @media (max-width: 360px) {
            .social-btns { flex-direction: column; }
        }

        .reason-message {
            background: #fff8e1; border: 2px solid #f59e0b; border-radius: 8px;
            padding: 1rem 1.1rem 1rem 3rem; margin-bottom: 1rem;
            color: #78350f; font-size: 0.9rem; font-weight: 500; line-height: 1.5;
            position: relative;
        }
        .reason-message::before {
            content: "⚠";
            position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <script>createHeader('Log in', true);</script>

    <div class="login-container">

        <div id="reasonMessage" class="reason-message" style="display:none"></div>

        <!-- Personal account options -->
        <div class="login-option" id="personalCard">
            <h3>Personal Sign In</h3>
            <p>View your volunteer profile, register for sessions, and upload photos.</p>

            <!-- Magic link email (shown when MAIL_SENDER is configured) -->
            <div id="magicLinkSection" style="display:none">
                <input type="email" id="magicEmail" class="magic-email-input"
                       placeholder="your@email.com" autocomplete="email">
                <button id="magicSendBtn" class="btn-magic-send" onclick="sendMagicLink()">Send login link</button>
                <div id="magicStatus" class="magic-status"></div>
                <div class="divider-or" id="magicDivider">or continue with</div>
            </div>

            <!-- Google + Facebook side by side -->
            <div class="social-btns" id="socialBtns">
                <a id="googleBtn" href="/auth/google/login" class="btn-signin">
                    <img src="/svg/google.svg" width="18" height="18" alt="">
                    Google
                </a>
                <a id="facebookBtn" href="/auth/facebook/login" class="btn-signin" target="_blank" rel="noopener noreferrer">
                    <img src="/svg/facebook.svg" width="18" height="18" alt="">
                    Facebook
                </a>
            </div>
        </div>

        <!-- Trusted Account (Microsoft dtv.org.uk) -->
        <div class="login-option">
            <h3>DTV Teams Account</h3>
            <p>For dig leads, coordinators and admins — use your <strong>@dtv.org.uk</strong> Microsoft account.</p>
            <a id="trustedBtn" href="/auth/login" class="btn-signin" style="width:100%; box-sizing:border-box;">
                <img src="/svg/microsoft.svg" width="18" height="18" alt="">
                Continue with Microsoft
            </a>
        </div>

    </div>

    <script>
        const reasons = {
            'not-approved':  (email) => `Your account${email ? ` (${email})` : ''} isn\'t linked to a volunteer profile. Please contact your coordinator to get set up.`,
            'not-found':     (email) => `Your account${email ? ` (${email})` : ''} isn\'t linked to a volunteer profile. Please contact your coordinator to get set up.`,
            'invalid-state': () => 'Something went wrong with the sign-in process. Please try again.',
            'no-email':      () => 'Your Facebook account doesn\'t have an email address we can use. Please try signing in with Google instead.',
        };

        async function sendMagicLink() {
            const email = document.getElementById('magicEmail').value.trim();
            if (!email) return;

            const btn = document.getElementById('magicSendBtn');
            const status = document.getElementById('magicStatus');
            btn.disabled = true;
            document.getElementById('magicEmail').disabled = true;
            status.className = 'magic-status';
            status.textContent = 'Sending…';
            status.style.display = 'block';

            try {
                const res = await fetch('/auth/magic/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ destination: email }),
                });
                if (res.ok) {
                    status.className = 'magic-status success';
                    status.textContent = 'Check your email — a login link is on its way (expires in 15 minutes).';
                } else {
                    status.className = 'magic-status error';
                    status.textContent = 'Something went wrong. Please try again.';
                    btn.disabled = false;
                    document.getElementById('magicEmail').disabled = false;
                }
            } catch {
                status.className = 'magic-status error';
                status.textContent = 'Could not send email. Please check your connection and try again.';
                btn.disabled = false;
                document.getElementById('magicEmail').disabled = false;
            }
        }

        document.getElementById('magicEmail').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMagicLink();
        });

        function init() {
            const params = new URLSearchParams(window.location.search);
            const returnTo = params.get('returnTo');

            const reason = params.get('reason');
            if (reason && reasons[reason]) {
                const email = params.get('email');
                fetch('/auth/me').then(r => r.json()).then(data => {
                    if (data.authenticated) {
                        window.location.replace(returnTo && returnTo.startsWith('/') ? returnTo : '/');
                        return;
                    }
                    const el = document.getElementById('reasonMessage');
                    el.textContent = reasons[reason](email);
                    el.style.display = 'block';
                }).catch(() => {
                    const el = document.getElementById('reasonMessage');
                    el.textContent = reasons[reason](email);
                    el.style.display = 'block';
                });
            }

            if (returnTo && returnTo.startsWith('/')) {
                document.getElementById('googleBtn').href = `/auth/google/login?returnTo=${encodeURIComponent(returnTo)}`;
                document.getElementById('facebookBtn').href = `/auth/facebook/login?returnTo=${encodeURIComponent(returnTo)}`;
                document.getElementById('trustedBtn').href = `/auth/login?returnTo=${encodeURIComponent(returnTo)}`;
            }
        }

        fetch('/auth/providers')
            .then(r => r.json())
            .then(p => {
                if (!p.google)   document.getElementById('googleBtn').style.display = 'none';
                if (!p.facebook) document.getElementById('facebookBtn').style.display = 'none';
                if (p.magic)     document.getElementById('magicLinkSection').style.display = 'block';

                // Hide divider if no social buttons are shown
                const hasSocial = p.google || p.facebook;
                if (!hasSocial) {
                    document.getElementById('socialBtns').style.display = 'none';
                    document.getElementById('magicDivider').style.display = 'none';
                }
                // Hide personal card entirely if nothing is configured
                if (!p.google && !p.facebook && !p.magic) {
                    document.getElementById('personalCard').style.display = 'none';
                }
            });

        init();
    </script>
    <script>createFooter();</script>
</body>
</html>
