<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTV Tracker</title>
    <meta name="description" content="DTV volunteer tracker — view upcoming sessions, volunteer hours, and group activity.">
    <meta name="google-site-verification" content="vVIf4WEbumHlQzwMsfhJSRo6V2Tew4kNpzL17yVVdBo" />
    <meta property="og:title" content="DTV Tracker">
    <meta property="og:description" content="DTV volunteer tracker — view upcoming sessions, volunteer hours, and group activity.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/media/embla/gallery.css">
    <script src="/js/common.js"></script>
    <script src="/js/tag-icons.js"></script>
    <script src="/js/session-cards.js"></script>
    <script src="/js/lightbox.js"></script>
    <script src="/js/calendar.js"></script>
    <script src="/js/word-cloud.js"></script>
    <script src="/js/home/stats-section.js"></script>
    <script src="/js/home/session-section.js"></script>
    <script src="/js/home/signups-section.js"></script>
</head>
<body>
    <script>createHeader(undefined, true);</script>

    <div class="container">
        <div id="trustedAccessWarning" style="display:none;margin-bottom:1rem;padding:0.875rem 1rem;background:var(--surface);border:1px solid var(--border-mid);border-radius:var(--radius);font-size:0.9rem;">
            You're signed in with your personal account. You also have a <a id="trustedAccessLink" href="/login.html">trusted account</a> with additional access.
        </div>

        <div id="mediaGalleryWrap" style="margin-bottom:1.5rem"></div>
        <script>
            (function() {
                const wrap = document.getElementById('mediaGalleryWrap');
                const maxWidth = Math.round(wrap.offsetWidth * 0.93);
                wrap.style.height = Math.round(maxWidth * 0.70) + 'px';
            })();
        </script>

        <div id="sessionSection"></div>
        <div class="session-eventbrite-cta unauth-only">
            <p>Want to volunteer with Dean Trail Volunteers?</p>
            <a class="btn-eventbrite-cta" href="https://dtv.eventbrite.co.uk" target="_blank" rel="noopener">Sign up on Eventbrite</a>
        </div>
        <div id="signupsSection"></div>
        <div id="statsSection"></div>

    </div>

    <script src="https://unpkg.com/embla-carousel/embla-carousel.umd.js"></script>
    <script src="/media/embla/gallery.js"></script>
    <script>createFooter();</script>
    <script>
        // Media gallery — sessions with photos, cover image per slide
        fetch('/api/sessions')
            .then(r => r.ok ? r.json() : null)
            .then(body => {
                const sessions = (body?.data || []).filter(s => s.mediaCount > 0);
                if (!sessions.length) { wrap.style.display = 'none'; return; }
                const items = sessions.map(s => ({
                    id: s.id,
                    largeUrl: `/media/${encodeURIComponent(s.groupKey)}/${encodeURIComponent(s.date)}/cover.jpg`,
                    thumbnailUrl: `/media/${encodeURIComponent(s.groupKey)}/${encodeURIComponent(s.date)}/cover.jpg`,
                    mimeType: 'image/jpeg',
                    title: [new Date(s.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }), s.groupName, s.displayName !== s.groupName ? s.displayName : ''].filter(Boolean).join('  ·  '),
                    _groupKey: s.groupKey,
                    _date: s.date,
                }));
                const wrap = document.getElementById('mediaGalleryWrap');
                const galleryOpts = () => {
                    const maxWidth = Math.round(wrap.offsetWidth * 0.93);
                    return { height: Math.round(maxWidth * 0.70), maxWidth, minWidth: Math.round(wrap.offsetWidth * 0.50) };
                };
                const gallery = new MediaGallery(wrap, {
                    ...galleryOpts(),
                    gap: 8,
                    radius: 6,
                    thumbs: false,
                    onAction: item => {
                        location.href = `/sessions/${encodeURIComponent(item._groupKey)}/${encodeURIComponent(item._date)}/details.html`;
                    },
                });
                gallery.setItems(items);
                let lastWidth = wrap.offsetWidth;
                new ResizeObserver(() => {
                    if (wrap.offsetWidth !== lastWidth) {
                        lastWidth = wrap.offsetWidth;
                        gallery.setOptions(galleryOpts());
                    }
                }).observe(wrap);
            })
            .catch(() => {});

        initStatsSection();
        initSessionSection();
        initSignupsSection();

        // Show trusted-account notice for self-service users who also have a Microsoft login
        document.addEventListener('authReady', e => {
            const trustedRole = e.detail?.trustedRole;
            if (trustedRole) {
                const label = trustedRole === 'admin' ? 'Admin' : 'Check-In';
                document.getElementById('trustedAccessLink').textContent = label + ' account';
                document.getElementById('trustedAccessWarning').style.display = 'block';
            }
        });
    </script>
</body>
</html>
