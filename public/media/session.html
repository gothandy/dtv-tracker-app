<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Gallery - DTV Tracker</title>
    <meta name="description" content="">
    <meta property="og:title" content="Session Gallery - DTV Tracker">
    <meta property="og:description" content="">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="embla/gallery.css">
    <script src="/js/common.js"></script>
    <script src="/js/lightbox.js"></script>
</head>
<body class="detail-page">
    <script>createHeader('Session Gallery', true);</script>

    <div class="container">
        <p id="status" style="color:var(--text-faint);font-size:0.9rem;">Loading…</p>
        <div id="galleryWrap"></div>
    </div>

    <script>createFooter();</script>

    <script src="https://unpkg.com/embla-carousel/embla-carousel.umd.js"></script>
    <script src="embla/gallery.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const groupKey = params.get('groupKey');
        const date = params.get('date');
        const status = document.getElementById('status');
        const wrap = document.getElementById('galleryWrap');

        if (!groupKey || !date) {
            status.textContent = 'Missing session parameters.';
        } else {
            Promise.all([
                fetch(`/api/sessions/${encodeURIComponent(groupKey)}/${encodeURIComponent(date)}`).then(r => r.json()),
                fetch(`/api/media?groupKey=${encodeURIComponent(groupKey)}&date=${encodeURIComponent(date)}`).then(r => r.json()),
            ])
            .then(([sessionBody, mediaBody]) => {
                if (!sessionBody.success) throw new Error(sessionBody.error || 'Session not found');
                if (!mediaBody.success) throw new Error(mediaBody.error || 'Media load failed');

                const session = sessionBody.data;
                const sessionTitle = session.displayName || session.groupName || groupKey;

                document.title = `${sessionTitle} - DTV Tracker`;
                setPageMeta({
                    ogTitle: `${sessionTitle} - DTV Tracker`,
                    description: `${mediaBody.data.length} photos · ${formatDate(date)}`,
                });

                const items = mediaBody.data.map(item => ({ ...item, title: sessionTitle }));

                if (!items.length) {
                    status.textContent = 'No photos for this session.';
                    return;
                }

                status.remove();

                const gallery = new MediaGallery(wrap, {
                    height: Math.min(Math.round(window.innerHeight * 0.62), 520),
                    gap: 8,
                    radius: 6,
                    onAction: (item, i) => {
                        openLightbox(i, items);
                    },
                });
                gallery.setItems(items);
            })
            .catch(err => {
                status.textContent = `Error: ${err.message}`;
                console.error('Session gallery load failed:', err);
            });
        }
    </script>
</body>
</html>
