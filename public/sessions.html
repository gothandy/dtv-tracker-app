<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions - DTV Tracker</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: var(--surface); border-radius: var(--radius); padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2); width: 90%; max-width: 400px;
        }
        .modal h3 { color: var(--dark); margin-bottom: 1rem; font-size: 1.1rem; }
        .modal-field { margin-bottom: 1rem; }
        .modal-field label { display: block; font-size: 0.85rem; color: var(--text-light); margin-bottom: 0.3rem; }
        .modal-field input[type="text"], .modal-field input[type="date"], .modal-field textarea, .modal-field select {
            width: 100%; font-size: 1rem; padding: 0.6rem 0.75rem;
            border: 2px solid var(--border-mid); border-radius: 6px; font-family: inherit;
        }
        .modal-field textarea { min-height: 60px; resize: vertical; }
        .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { outline: none; border-color: var(--green); }
        .modal-buttons { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .modal-btn {
            padding: 0.5rem 1rem; border-radius: var(--radius); font-size: 0.9rem;
            font-weight: 600; cursor: pointer; border: none; min-height: 40px;
        }
        .modal-btn-cancel { background: var(--bg); color: var(--text-light); }
        .modal-btn-confirm { background: var(--green); color: white; }
        .modal-btn-confirm:hover { background: var(--green-dark); }
        .modal-btn-confirm:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
    <script src="/js/common.js"></script>
    <script src="/js/session-cards.js"></script>
    <script src="/js/lightbox.js"></script>
</head>
<body class="detail-page">
    <script>createHeader('Volunteer Sessions', true);</script>

    <div class="container">
        <div class="filter-bar">
            <div class="title-row">
                <div class="title-left">
                    <h2>Sessions</h2>
                    <div class="count" id="sessionCount">-</div>
                </div>
                <div style="display:flex; gap:0.5rem;">
                    <div class="dropdown">
                        <button class="dropdown-btn" onclick="toggleDropdown('filterMenu')">
                            <svg viewBox="0 0 16 16"><path d="M1.5 1.5h13L10 7.5V13l-4 2V7.5z"/></svg>
                            <span id="filterLabel">Loading…</span>
                        </button>
                        <div class="dropdown-menu" id="filterMenu">
                        </div>
                    </div>
                    <button class="btn-action admin-only" onclick="openNewSessionModal()">
                        <svg viewBox="0 0 16 16"><path d="M8 2v12M2 8h12" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
                    </button>
                </div>
            </div>
            <div class="filter-row">
                <input type="text" class="filter-search" id="searchBox" placeholder="Search sessions…" autocomplete="off">
                <button class="advanced-toggle" id="advancedToggle" onclick="toggleAdvanced()">Advanced &#9662;</button>
            </div>
            <div class="advanced-section" id="advancedSection">
                <div class="advanced-row">
                    <select id="groupSelect" onchange="setGroup(this.value)">
                        <option value="">All Groups</option>
                    </select>
                    <select id="tagSelect" onchange="setTag(this.value)">
                        <option value="">All Tags</option>
                    </select>
                </div>
                <div class="advanced-row" style="justify-content: space-between;">
                    <a href="#" id="selectAllLink" class="select-all-link" onclick="toggleSelectAll(); return false;" style="display:none;">Select all</a>
                    <button class="advanced-toggle admin-only" id="addTagsBtn" onclick="openBulkTagModal()" disabled>Add Tags</button>
                </div>
            </div>
        </div>

        <div id="content">
            <div class="loading">Loading sessions</div>
        </div>
    </div>

    <div class="modal-overlay" id="newSessionModal">
        <div class="modal">
            <h3>New Session</h3>
            <div class="modal-field">
                <label for="newGroup">Group</label>
                <select id="newGroup"></select>
            </div>
            <div class="modal-field">
                <label for="newDate">Date</label>
                <input type="date" id="newDate">
            </div>
            <div class="modal-field">
                <label for="newName">Name (optional)</label>
                <input type="text" id="newName">
            </div>
            <div class="modal-field">
                <label for="newDescription">Description (optional)</label>
                <textarea id="newDescription"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeNewSessionModal()">Cancel</button>
                <button class="modal-btn modal-btn-confirm" id="confirmNewBtn" onclick="saveNewSession()">Create</button>
            </div>
        </div>
    </div>

    <script>
        let allSessions = [];
        let allGroups = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let currentGroup = '';
        let currentTag = '';
        let advancedOpen = false;
        let selectedSessions = new Set();

        function fyKeyToLabel(fyKey) {
            const startYear = parseInt(fyKey.replace('FY', ''));
            const endYear = startYear + 1;
            return `FY ${String(startYear).slice(2)}/${String(endYear).slice(2)}`;
        }

        function applyURLParams() {
            const params = new URLSearchParams(window.location.search);
            currentSearch = params.get('search') || '';
            currentGroup  = params.get('group')  || '';
            currentTag    = params.get('tag')    || '';
            if (currentSearch) document.getElementById('searchBox').value = currentSearch;
            if (currentGroup || currentTag) {
                advancedOpen = true;
                document.getElementById('advancedSection').classList.add('open');
                document.getElementById('advancedToggle').innerHTML = 'Advanced &#9650;';
                updateSelectAllLink();
            }
        }

        function persistFilters() {
            const url = new URL(window.location.href);
            currentSearch ? url.searchParams.set('search', currentSearch) : url.searchParams.delete('search');
            currentGroup  ? url.searchParams.set('group',  currentGroup)  : url.searchParams.delete('group');
            currentTag    ? url.searchParams.set('tag',    currentTag)    : url.searchParams.delete('tag');
            history.replaceState(null, '', url);
        }

        function buildDropdown() {
            const fyKeys = [...new Set(allSessions.map(s => s.financialYear))]
                .filter(k => k && k.startsWith('FY'))
                .sort((a, b) => a.localeCompare(b));

            const menu = document.getElementById('filterMenu');
            menu.innerHTML = '';

            const btnAll = document.createElement('button');
            btnAll.id = 'fyBtn_all';
            btnAll.textContent = 'All';
            btnAll.onclick = () => filterSessions('all');
            menu.appendChild(btnAll);

            fyKeys.forEach(fyKey => {
                const btn = document.createElement('button');
                btn.id = `fyBtn_${fyKey}`;
                btn.textContent = fyKeyToLabel(fyKey);
                btn.onclick = () => filterSessions(fyKey);
                menu.appendChild(btn);
            });
        }

        function buildFilterDropdowns() {
            // Groups
            const groupSelect = document.getElementById('groupSelect');
            groupSelect.innerHTML = '<option value="">All Groups</option>';
            const groups = [...new Map(
                allSessions.filter(s => s.groupName && s.groupId != null)
                           .map(s => [s.groupId, s.groupName])
            ).entries()].sort((a, b) => a[1].localeCompare(b[1]));
            groups.forEach(([id, name]) => {
                const opt = document.createElement('option');
                opt.value = String(id);
                opt.textContent = name;
                groupSelect.appendChild(opt);
            });
            if (currentGroup) groupSelect.value = currentGroup;

            // Tags
            const tagSelect = document.getElementById('tagSelect');
            tagSelect.innerHTML = '<option value="">All Tags</option>';
            const tagMap = new Map();
            allSessions.forEach(s => (s.metadata || []).forEach(t => {
                if (t.termGuid && !tagMap.has(t.termGuid)) tagMap.set(t.termGuid, t.label);
            }));
            [...tagMap.entries()]
                .sort((a, b) => tagShortLabel(a[1]).localeCompare(tagShortLabel(b[1])))
                .forEach(([guid, label]) => {
                    const opt = document.createElement('option');
                    opt.value = guid;
                    opt.textContent = tagShortLabel(label);
                    tagSelect.appendChild(opt);
                });
            if (currentTag) tagSelect.value = currentTag;
        }

        function tagShortLabel(label) {
            const parts = label.split('>');
            return parts[parts.length - 1].trim();
        }

        function toggleDropdown(menuId) {
            const menu = document.getElementById(menuId);
            const wasOpen = menu.classList.contains('open');
            document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
            if (!wasOpen) menu.classList.add('open');
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown')) {
                document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
            }
        });

        function toggleAdvanced() {
            advancedOpen = !advancedOpen;
            const section = document.getElementById('advancedSection');
            const btn = document.getElementById('advancedToggle');
            section.classList.toggle('open', advancedOpen);
            btn.innerHTML = advancedOpen ? 'Advanced &#9650;' : 'Advanced &#9662;';
            if (!advancedOpen) {
                selectedSessions.clear();
                updateBulkTagButton();
            }
            updateSelectAllLink();
            displaySessions(allSessions);
        }

        function getVisibleSessionIds() {
            let filtered = allSessions;
            if (currentFilter !== 'all') filtered = filtered.filter(s => s.financialYear === currentFilter);
            if (currentGroup) filtered = filtered.filter(s => String(s.groupId) === currentGroup);
            if (currentTag) filtered = filtered.filter(s => (s.metadata || []).some(t => t.termGuid === currentTag));
            if (currentSearch.length >= 3) {
                const term = currentSearch.toLowerCase();
                filtered = filtered.filter(s =>
                    (s.displayName || '').toLowerCase().includes(term) ||
                    (s.description  || '').toLowerCase().includes(term)
                );
            }
            return filtered.map(s => s.id);
        }

        function updateBulkTagButton() {
            const btn = document.getElementById('addTagsBtn');
            if (!btn) return;
            const count = selectedSessions.size;
            btn.disabled = count === 0;
            btn.textContent = count > 0 ? `Add Tags (${count})` : 'Add Tags';
        }

        function updateSelectAllLink() {
            const link = document.getElementById('selectAllLink');
            if (!link) return;
            link.style.display = advancedOpen ? '' : 'none';
            const visibleIds = getVisibleSessionIds();
            const allChecked = visibleIds.length > 0 && visibleIds.every(id => selectedSessions.has(id));
            link.textContent = allChecked ? 'Deselect all' : 'Select all';
        }

        function toggleSelectAll() {
            const visibleIds = getVisibleSessionIds();
            const allChecked = visibleIds.length > 0 && visibleIds.every(id => selectedSessions.has(id));
            if (allChecked) {
                visibleIds.forEach(id => selectedSessions.delete(id));
            } else {
                visibleIds.forEach(id => selectedSessions.add(id));
            }
            updateSelectAllLink();
            updateBulkTagButton();
            displaySessions(allSessions);
        }

        function openBulkTagModal() {
            // Implemented in Step 5
        }

        function setGroup(value) {
            currentGroup = value;
            persistFilters();
            displaySessions(allSessions);
        }

        function setTag(value) {
            currentTag = value;
            persistFilters();
            displaySessions(allSessions);
        }

        function filterSessions(filter) {
            currentFilter = filter;
            persistFY(filter);
            persistFilters();
            const label = filter === 'all' ? 'All' : fyKeyToLabel(filter);
            document.getElementById('filterLabel').textContent = label;
            document.querySelectorAll('#filterMenu button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`fyBtn_${filter}`);
            if (activeBtn) activeBtn.classList.add('active');
            document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
            displaySessions(allSessions);
        }

        function displaySessions(sessions) {
            const contentDiv = document.getElementById('content');
            const countDiv = document.getElementById('sessionCount');

            let filtered = sessions;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(s => s.financialYear === currentFilter);
            }
            if (currentGroup) {
                filtered = filtered.filter(s => String(s.groupId) === currentGroup);
            }
            if (currentTag) {
                filtered = filtered.filter(s =>
                    (s.metadata || []).some(t => t.termGuid === currentTag)
                );
            }
            if (currentSearch.length >= 3) {
                const term = currentSearch.toLowerCase();
                filtered = filtered.filter(s =>
                    (s.displayName || '').toLowerCase().includes(term) ||
                    (s.description  || '').toLowerCase().includes(term)
                );
            }

            countDiv.textContent = filtered.length;
            renderSessionList(contentDiv, filtered, {
                checkboxMode: advancedOpen,
                checkedIds: selectedSessions,
                onCheckChange: (id, checked) => {
                    if (checked) selectedSessions.add(id);
                    else selectedSessions.delete(id);
                    updateSelectAllLink();
                    updateBulkTagButton();
                }
            });
        }

        document.getElementById('searchBox').addEventListener('input', function() {
            currentSearch = this.value.trim();
            persistFilters();
            displaySessions(allSessions);
        });

        async function loadSessions() {
            const contentDiv = document.getElementById('content');
            const countDiv = document.getElementById('sessionCount');

            try {
                const response = await fetch('/api/sessions');
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.error || 'Failed to fetch sessions');
                }

                allSessions = data.data;
                buildDropdown();
                buildFilterDropdowns();
                filterSessions(getStoredFY());

            } catch (error) {
                console.error('Error loading sessions:', error);
                countDiv.textContent = '?';
                showError(contentDiv, 'Error Loading Sessions', error.message);
            }
        }

        async function loadGroups() {
            try {
                const response = await fetch('/api/groups');
                if (!response.ok) return;
                const data = await response.json();
                if (!data.success) return;
                allGroups = data.data;
            } catch (e) {
                console.error('Error loading groups:', e);
            }
        }

        function openNewSessionModal() {
            const select = document.getElementById('newGroup');
            select.innerHTML = '<option value="">Select a group...</option>' +
                allGroups.map(g => `<option value="${g.id}">${escapeHtml(g.displayName || g.key)}</option>`).join('');
            document.getElementById('newDate').value = '';
            document.getElementById('newName').value = '';
            document.getElementById('newDescription').value = '';
            document.getElementById('newSessionModal').classList.add('visible');
            select.focus();
        }

        function closeNewSessionModal() {
            document.getElementById('newSessionModal').classList.remove('visible');
        }

        async function saveNewSession() {
            const groupId = document.getElementById('newGroup').value;
            const date = document.getElementById('newDate').value;
            const name = document.getElementById('newName').value.trim();
            const description = document.getElementById('newDescription').value.trim();

            if (!groupId) {
                document.getElementById('newGroup').focus();
                return;
            }
            if (!date) {
                document.getElementById('newDate').focus();
                return;
            }

            const btn = document.getElementById('confirmNewBtn');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const res = await apiFetch('/api/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ groupId: Number(groupId), date, name: name || undefined, description: description || undefined })
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || 'Failed to create session');
                }

                const result = await res.json();
                closeNewSessionModal();
                window.location.href = `/sessions/${encodeURIComponent(result.data.groupKey)}/${result.data.date}/details.html`;
            } catch (error) {
                console.error('Error creating session:', error);
                alert(error.message || 'Failed to create session.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create';
            }
        }

        applyURLParams();
        loadSessions();
        loadGroups();
    </script>
</body>
</html>
