<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions - DTV Tracker</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/common.js"></script>
    <script src="/js/session-cards.js"></script>
    <script src="/js/session-tags.js"></script>
    <script src="/js/lightbox.js"></script>
</head>
<body class="detail-page">
    <script>createHeader('Volunteer Sessions', true);</script>

    <div class="container">
        <div class="filter-bar">
            <div class="title-row">
                <div class="title-left">
                    <h2>Sessions</h2>
                    <div class="count" id="sessionCount">-</div>
                </div>
                <div style="display:flex; gap:0.5rem;">
                    <div class="dropdown">
                        <button class="dropdown-btn" onclick="toggleDropdown('filterMenu')">
                            <svg viewBox="0 0 16 16"><path d="M1.5 1.5h13L10 7.5V13l-4 2V7.5z"/></svg>
                            <span id="filterLabel">Loading…</span>
                        </button>
                        <div class="dropdown-menu" id="filterMenu">
                        </div>
                    </div>
                    <button class="btn-action admin-only" onclick="openNewSessionModal()">
                        <svg viewBox="0 0 16 16"><path d="M8 2v12M2 8h12" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
                    </button>
                </div>
            </div>
            <div class="filter-row">
                <input type="text" class="filter-search" id="searchBox" placeholder="Search sessions…" autocomplete="off">
                <button class="advanced-toggle" id="advancedToggle" onclick="toggleAdvanced()">Advanced &#9662;</button>
            </div>
            <div class="advanced-section" id="advancedSection">
                <div class="advanced-row">
                    <select id="groupSelect" onchange="setGroup(this.value)">
                        <option value="">All Groups</option>
                    </select>
                    <div class="tag-filter-wrap" id="tagFilterWrap">
                        <button class="tag-filter-btn" id="tagFilterBtn" onclick="toggleTagFilter()">
                            <span id="tagFilterLabel">All Tags</span>
                            <span>&#9662;</span>
                        </button>
                        <div class="tag-filter-panel" id="tagFilterPanel" style="display:none;">
                            <ul class="tag-tree tag-filter-tree" id="tagFilterTree"></ul>
                        </div>
                    </div>
                </div>
                <div class="advanced-row" style="justify-content: space-between;">
                    <a href="#" id="selectAllLink" class="select-all-link" onclick="toggleSelectAll(); return false;" style="display:none;">Select all</a>
                    <button class="advanced-toggle admin-only" id="addTagsBtn" onclick="openBulkTagModal()" disabled>Add Tags</button>
                </div>
                <p id="selectionStats" class="advanced-selection-stats" style="display:none;"></p>
            </div>
        </div>

        <div id="content">
            <div class="loading">Loading sessions</div>
        </div>
    </div>

    <div class="modal-overlay" id="newSessionModal">
        <div class="modal">
            <h3>New Session</h3>
            <div class="modal-field">
                <label for="newGroup">Group</label>
                <select id="newGroup"></select>
            </div>
            <div class="modal-field">
                <label for="newDate">Date</label>
                <input type="date" id="newDate">
            </div>
            <div class="modal-field">
                <label for="newName">Name (optional)</label>
                <input type="text" id="newName">
            </div>
            <div class="modal-field">
                <label for="newDescription">Description (optional)</label>
                <textarea id="newDescription"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeNewSessionModal()">Cancel</button>
                <button class="modal-btn modal-btn-confirm" id="confirmNewBtn" onclick="saveNewSession()">Create</button>
            </div>
        </div>
    </div>

    <script src="/js/sessions.js"></script>
</body>
</html>
