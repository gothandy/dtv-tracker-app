<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Media - DTV</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

        .upload-header {
            background: var(--dark); color: white;
            padding: 1.25rem 1.5rem;
            display: flex; align-items: center; gap: 0.75rem;
        }
        .upload-header img { height: 36px; }
        .upload-header h1 { font-size: 1.25rem; margin: 0; }

        .upload-container {
            max-width: 520px; margin: 2rem auto; padding: 0 1.25rem; width: 100%;
        }

        .upload-card {
            background: var(--surface); border-radius: 12px;
            padding: 2rem; box-shadow: var(--shadow);
        }

        /* Context info (step 2) */
        .context-info { margin-bottom: 1.5rem; }
        .context-info-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
        .context-info .volunteer-name { font-size: 1.4rem; font-weight: 700; color: var(--dark); }
        .context-info .session-name { color: var(--text-light); margin-top: 0.25rem; }
        .share-btn {
            background: none; border: none; cursor: pointer; padding: 0.25rem;
            color: var(--text-light); flex-shrink: 0;
        }
        .share-btn:hover { color: var(--green); }
        .share-btn svg { width: 22px; height: 22px; display: block; }

        .file-zone {
            border: 2px dashed var(--border-mid); border-radius: 8px;
            padding: 2rem 1rem; text-align: center; cursor: pointer;
            margin-bottom: 1rem; transition: border-color 0.2s, background 0.2s;
        }
        .file-zone:hover, .file-zone.dragover { border-color: var(--green); background: var(--green-bg); }
        .file-zone-label { font-size: 1rem; color: var(--text); margin-bottom: 0.4rem; }
        .file-zone-hint { font-size: 0.85rem; color: var(--text-light); }

        .file-list { margin-bottom: 1rem; }
        .file-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.5rem 0; border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .file-item:last-child { border-bottom: none; }
        .file-status { font-weight: 600; }
        .file-status.ok { color: var(--green); }
        .file-status.err { color: var(--error, #e74c3c); }
        .file-status.pending { color: var(--text-light); }

        /* Step 3 — done */
        .done-message { text-align: center; padding: 1rem 0; }
        .done-message .done-count { font-size: 1.5rem; font-weight: 700; color: var(--green); margin-bottom: 0.5rem; }
        .done-message p { color: var(--text-light); }

        .btn-primary {
            width: 100%; padding: 0.9rem; background: var(--green); color: white;
            border: none; border-radius: var(--radius); font-size: 1rem;
            font-weight: 600; cursor: pointer; min-height: 44px;
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .loading-text { text-align: center; color: var(--text-light); padding: 1rem 0; }

        .error-message {
            text-align: center; padding: 1rem 0;
            color: var(--error, #e74c3c); font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="upload-header">
        <img src="/img/logo.png" alt="DTV">
        <h1>DTV Media Upload</h1>
    </div>

    <div class="upload-container">
        <div class="upload-card">

            <!-- Loading -->
            <div id="step-loading" class="loading-text">Checking code&hellip;</div>

            <!-- Error -->
            <div id="step-error" style="display:none">
                <div class="error-message" id="errorMessage"></div>
            </div>

            <!-- Step 2: Upload -->
            <div id="step-upload" style="display:none">
                <div class="context-info">
                    <div class="context-info-row">
                        <div>
                            <div class="volunteer-name" id="ctxName"></div>
                            <div class="session-name" id="ctxSession"></div>
                        </div>
                        <button class="share-btn" onclick="shareLink()" title="Share this link">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="file-zone" id="fileZone" onclick="document.getElementById('fileInput').click()">
                    <div class="file-zone-label">Tap to choose photos or short videos</div>
                    <div class="file-zone-hint">JPG, PNG, WebP, HEIC, MP4, MOV &middot; up to 10 files &middot; max 10 MB each</div>
                </div>
                <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp,.heic,.heif,.mp4,.mov,.m4v" multiple style="display:none">

                <div class="file-list" id="fileList"></div>

                <button class="btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled>
                    Select files to upload
                </button>
            </div>

            <!-- Step 3: Done -->
            <div id="step-done" style="display:none">
                <div class="done-message">
                    <div class="done-count" id="doneCount"></div>
                    <p>Thanks for sharing your media! It'll be reviewed by a volunteer coordinator and may be used in our gallery.</p>
                    <a id="sessionLink" href="#" style="display:none;margin-top:1rem;color:var(--green);font-weight:600;">View session gallery</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        let activeCode = null;
        let activeSessionId = null;
        let activeIsAuthenticated = false;
        let selectedFiles = [];

        function showError(message) {
            document.getElementById('step-loading').style.display = 'none';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('step-error').style.display = 'block';
        }

        async function init() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            const code = parts.length >= 2 ? parts[1].toUpperCase() : '';

            if (!code || !/^[A-Z]{4}$/.test(code)) {
                showError('No upload code found. Please use the link provided by your session admin.');
                return;
            }

            try {
                const res = await fetch('/api/upload/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                const data = await res.json();

                if (!res.ok || !data.success) {
                    const reason = data.reason;
                    showError(reason === 'expired'
                        ? 'This code has expired. Please ask for a new one.'
                        : 'Code not found. Please check and try again.');
                    return;
                }

                activeCode = code;
                activeSessionId = data.data.sessionId;
                activeIsAuthenticated = data.data.isAuthenticated;
                showUploadStep(data.data);
            } catch {
                showError('Could not connect. Please try again.');
            }
        }

        function showUploadStep(context) {
            document.getElementById('step-loading').style.display = 'none';
            document.getElementById('ctxName').textContent = context.profileName;
            document.getElementById('ctxSession').textContent = context.sessionName;
            document.getElementById('step-upload').style.display = 'block';

            const fileInput = document.getElementById('fileInput');
            fileInput.addEventListener('change', function() {
                handleFiles(Array.from(this.files));
            });

            const zone = document.getElementById('fileZone');
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('dragover');
                handleFiles(Array.from(e.dataTransfer.files));
            });
        }

        function shareLink() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: 'DTV Media Upload', url });
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    const btn = document.querySelector('.share-btn');
                    btn.title = 'Copied!';
                    setTimeout(() => btn.title = 'Share this link', 2000);
                });
            }
        }

        function handleFiles(files) {
            selectedFiles = files.slice(0, 10);
            const list = document.getElementById('fileList');
            list.innerHTML = selectedFiles.map((f, i) => `
                <div class="file-item" id="file-${i}">
                    <span>${escapeHtml(f.name)}</span>
                    <span class="file-status pending" id="status-${i}">${formatSize(f.size)}</span>
                </div>
            `).join('');
            const btn = document.getElementById('uploadBtn');
            btn.disabled = selectedFiles.length === 0;
            btn.textContent = selectedFiles.length === 0
                ? 'Select files to upload'
                : `Upload ${selectedFiles.length} file${selectedFiles.length !== 1 ? 's' : ''}`;
        }

        async function uploadFiles() {
            if (selectedFiles.length === 0 || !activeCode) return;
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;

            let uploaded = 0;
            let failed = 0;

            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const statusEl = document.getElementById(`status-${i}`);
                statusEl.textContent = 'Uploading\u2026';
                statusEl.className = 'file-status pending';

                try {
                    const fd = new FormData();
                    fd.append('code', activeCode);
                    fd.append('photos', file);

                    const res = await fetch('/api/upload/files', { method: 'POST', body: fd });
                    const data = await res.json();

                    if (res.ok && data.success && data.data.uploaded > 0) {
                        statusEl.textContent = '\u2713 Uploaded';
                        statusEl.className = 'file-status ok';
                        uploaded++;
                    } else {
                        throw new Error(data.error || 'Upload failed');
                    }
                } catch {
                    statusEl.textContent = '\u2717 Failed';
                    statusEl.className = 'file-status err';
                    failed++;
                }
            }

            setTimeout(() => {
                document.getElementById('step-upload').style.display = 'none';
                document.getElementById('doneCount').textContent =
                    `${uploaded} file${uploaded !== 1 ? 's' : ''} uploaded`;
                if (activeSessionId && activeIsAuthenticated) {
                    const link = document.getElementById('sessionLink');
                    link.href = `/session-detail.html?id=${activeSessionId}`;
                    link.style.display = 'inline-block';
                }
                document.getElementById('step-done').style.display = 'block';
            }, 800);
        }

        function formatSize(bytes) {
            if (bytes > 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
            return Math.round(bytes / 1024) + ' KB';
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        init();
    </script>
</body>
</html>
