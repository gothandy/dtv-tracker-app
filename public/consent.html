<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collect Consent - DTV Tracker</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/common.js"></script>
    <style>
        .consent-form-card {
            background: var(--surface);
            border: 1px solid var(--border-mid);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .consent-for {
            font-size: 1rem;
            color: var(--text-mid);
            margin-bottom: 1.5rem;
        }
        .consent-for strong {
            color: var(--dark);
        }
        .consent-item {
            display: flex;
            gap: 0.85rem;
            align-items: flex-start;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }
        .consent-item:last-of-type {
            border-bottom: none;
        }
        .consent-item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            min-width: 24px;
            accent-color: var(--green);
            cursor: pointer;
            margin-top: 0.1rem;
        }
        .consent-item label {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text);
            cursor: pointer;
        }
        .consent-required-note {
            font-size: 0.8rem;
            color: var(--text-faint);
            margin-top: 0.3rem;
        }
        .privacy-policy-link {
            display: block;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: var(--green-dark);
        }
        .consent-submit-row {
            margin-top: 1.5rem;
        }
        .btn-consent-submit {
            width: 100%;
            padding: 0.9rem 1.5rem;
            background: var(--green);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            min-height: 48px;
            transition: background 0.2s;
        }
        .btn-consent-submit:hover:not(:disabled) { background: var(--green-dark); }
        .btn-consent-submit:disabled {
            background: var(--border-mid);
            color: var(--text-faint);
            cursor: not-allowed;
        }
        .consent-success {
            background: var(--green-light);
            border: 1px solid var(--green);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
        }
        .consent-success h2 {
            color: var(--green-dark);
            margin-bottom: 0.5rem;
        }
        .consent-success p {
            color: var(--text-mid);
            margin-bottom: 1rem;
        }
        .consent-error {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            color: var(--error);
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body class="detail-page">
    <script>createHeader('Consent', true);</script>

    <div class="container">
        <div id="content">
            <div class="loading">Loading profile</div>
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/');
        const profileSlug = pathParts[2];
        let profileId = null;
        let profileName = null;
        let profileEmail = null;

        async function init() {
            try {
                const res = await apiFetch(`/api/profiles/${profileSlug}`);
                if (!res.ok) {
                    const d = await res.json();
                    showError(d.error || 'Profile not found');
                    return;
                }
                const data = await res.json();
                const profile = data.data;
                profileId = profile.id;
                profileName = profile.name;
                profileEmail = profile.email || null;
                renderForm();
            } catch (e) {
                console.error('Failed to load profile:', e);
                showError('Failed to load profile.');
            }
        }

        function showError(msg) {
            document.getElementById('content').innerHTML =
                `<div class="error-message">${escapeHtml(msg)}</div>`;
        }

        function renderForm() {
            document.getElementById('content').innerHTML = `
                <div class="page-header">
                    <h1>Collect Consent</h1>
                </div>
                <div class="consent-form-card">
                    <p class="consent-for">For: <strong>${escapeHtml(profileName)}</strong>${profileEmail ? `<br><span style="font-weight:normal; font-size:0.9rem;">${escapeHtml(profileEmail)}</span>` : ''}</p>

                    <div class="consent-item">
                        <input type="checkbox" id="privacyCheck">
                        <div>
                            <label for="privacyCheck">I consent to the collection and use of my name, email address, and volunteer activity history (including hours contributed) for the purposes of volunteer coordination, safety communications, and anonymized impact reporting.</label>
                            <p class="consent-required-note">Required</p>
                        </div>
                    </div>

                    <div class="consent-item">
                        <input type="checkbox" id="photoCheck">
                        <div>
                            <label for="photoCheck">I consent to being photographed and/or filmed during Dean Trail Volunteers activities for use on our social media, website, promotional materials, and fundraising campaigns.</label>
                        </div>
                    </div>

                    <a class="privacy-policy-link" href="https://tracker.dtv.org.uk/privacy.html" target="_blank" rel="noopener">View our Privacy Policy</a>

                    <div class="consent-submit-row">
                        <button class="btn-consent-submit" id="submitBtn" disabled onclick="submitConsent()">Submit</button>
                    </div>
                    <div class="consent-error" id="errorMsg"></div>
                </div>
            `;

            document.getElementById('privacyCheck').addEventListener('change', function () {
                document.getElementById('submitBtn').disabled = !this.checked;
            });
        }

        async function submitConsent() {
            const privacyConsent = document.getElementById('privacyCheck').checked;
            const photoConsent = document.getElementById('photoCheck').checked;
            const btn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = 'Submitting...';
            errorEl.style.display = 'none';

            try {
                const res = await apiFetch(`/api/profiles/${profileId}/consent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ privacyConsent, photoConsent })
                });
                if (!res.ok) {
                    const d = await res.json();
                    throw new Error(d.error || 'Submission failed');
                }
                document.getElementById('content').innerHTML = `
                    <div class="consent-success">
                        <h2>Consent recorded</h2>
                        <p>Thank you, ${escapeHtml(profileName)}.</p>
                        <a class="btn" href="/profiles/${encodeURIComponent(profileSlug)}/details.html">Back to profile</a>
                    </div>
                `;
            } catch (e) {
                console.error('Consent submission failed:', e);
                errorEl.textContent = e.message || 'Submission failed. Please try again.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Submit';
            }
        }

        init();
    </script>
</body>
</html>
